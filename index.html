<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller - Apna Swad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="animation-container">
    <div id="walking-char">💼</div>
</div>

<div class="login-screen" id="loginScreen">
    <div class="glass-card" id="mainCard">
        <div class="login-logo">🎬</div>
        <h1 class="login-title">Roller</h1>
        <p class="login-subtitle">Apna Swad, Apna Style</p>
        
        <button class="login-btn phone-btn" onclick="openAuthModal('phone')">📱 Continue with Phone</button>
        <button class="login-btn email-btn" onclick="openAuthModal('email')">✉️ Continue with Email</button>
        
        <div class="login-divider"><span>OR</span></div>
        
        <div class="social-btns">
            <button class="icon-btn" onclick="loginWithGoogle()">🔵</button>
            <button class="icon-btn" onclick="loginWithFacebook()">📘</button>
        </div>

        <p class="login-terms">By continuing, you agree to our <a href="#">Terms</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
