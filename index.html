<div class="container" id="auth-container">
    <div id="auth">
        <h3>Welcome to Rollera</h3>
        <input id="login-email" type="email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p style="margin-top:15px;">Naye ho? <a href="javascript:void(0)" onclick="openSignup()" style="color: #ff0050; font-weight:bold; text-decoration:none;">Account Banayein</a></p>
    </div>
</div>

<div id="signupModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="closeSignup()">&times;</span>
        <h2>Join Rollera 🔥</h2>
        <p>Apni details bhariye</p>
        
        <div class="input-group">
            <input id="name" type="text" placeholder="Full Name" required>
            <input id="age" type="number" placeholder="Age" required>
            <input id="email" type="email" placeholder="Gmail ID" required>
            <input id="mobile" type="tel" placeholder="Mobile Number" required>
            <input id="password" type="password" placeholder="Set Password" required>
        </div>
        
        <button class="signup-submit" onclick="handleSignup()">Register Now</button>
    </div>
</div>
