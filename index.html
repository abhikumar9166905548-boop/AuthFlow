<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Final Boss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;background:#000;color:#fff;font-family:system-ui;}
        header{padding:20px;text-align:center;background:linear-gradient(90deg,#ff0050,#7f00ff);font-size:24px;font-weight:bold;}
        #auth, #app {padding:20px;}
        input, button {width:100%;padding:15px;margin-top:10px;border-radius:10px;border:none;box-sizing:border-box;}
        input {background:#111;color:#fff;border:1px solid #333;}
        button {background:#ff0050;color:#fff;font-weight:bold;cursor:pointer;}
        .modal-overlay {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;}
        .modal-content {background:#000;width:90%;max-width:400px;padding:30px;border-radius:20px;border:1px solid #333;text-align:center;}
    </style>
</head>
<body>

<header>🔥 Rollera</header>

<div id="auth">
    <h3>Login / Signup</h3>
    <input id="login-email" placeholder="Email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <button onclick="openSignup()" style="background:#333;margin-top:10px;">Create Account</button>
</div>

<div id="signupModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color:#ff0050;">Join Rollera</h2>
        <input id="signup-name" placeholder="Full Name">
        <input id="signup-age" type="number" placeholder="Age">
        <input id="signup-mobile" placeholder="Mobile Number">
        <input id="signup-email" placeholder="Gmail ID">
        <input id="signup-password" type="password" placeholder="Set Password">
        
        <div id="otpSection" style="display:none;margin-top:15px;">
            <p style="color:#ff0050;font-size:12px;">Testing OTP: 123456</p>
            <input id="otpInput" placeholder="Enter OTP">
            <button onclick="verifyAndSignup()" style="background:#28a745;">Verify & Register</button>
        </div>
        
        <button id="sendOtpBtn" onclick="sendOtpLogic()">Send OTP</button>
        <button onclick="closeSignup()" style="background:#222;margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="app" style="display:none;">
    <h2 style="text-align:center;">Welcome to Rollera Feed!</h2>
    <button onclick="localStorage.clear(); location.reload()">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
