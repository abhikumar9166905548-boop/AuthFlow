<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rollera • Final Boss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{margin:0;background:#000;color:#fff;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden;}
        #mainHeader {padding:15px; text-align:center; background: #000; border-bottom: 0.5px solid #262626; font-size:24px; font-weight:bold; position: sticky; top: 0; z-index: 100;}
        
        #auth {padding: 20px; max-width: 400px; margin: auto;}
        input {width:100%; padding:12px; margin-top:10px; border-radius:5px; border: 0.5px solid #363636; background:#121212; color:#fff; box-sizing:border-box;}
        button {width:100%; padding:10px; margin-top:15px; border-radius:8px; border:none; background:#0095f6; color:#fff; font-weight:bold; cursor:pointer;}

        /* App Layout Styles */
        #app { background: #000; min-height: 100vh; padding-bottom: 70px; }
        
        /* Stories */
        .story-container { display: flex; overflow-x: auto; padding: 15px 10px; border-bottom: 0.5px solid #262626; gap: 12px; scrollbar-width: none; }
        .story-container::-webkit-scrollbar { display: none; }
        .story-wrapper { text-align: center; width: 75px; flex-shrink: 0; }
        .story-ring { width: 66px; height: 66px; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 2px; margin: auto; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid black; object-fit: cover; }
        .story-wrapper span { font-size: 11px; display: block; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Feed Post */
        .post-card { border-bottom: 0.5px solid #262626; margin-bottom: 10px; width: 100%; max-width: 500px; margin: auto; }
        .post-header { display: flex; align-items: center; padding: 10px; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .post-img { width: 100%; height: auto; max-height: 600px; object-fit: cover; }
        .post-actions { display: flex; padding: 12px; gap: 18px; font-size: 22px; }
        .post-info { padding: 0 12px 12px 12px; font-size: 14px; }
        .post-info b { cursor: pointer; }

        /* Bottom Navbar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 0.5px solid #262626; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .bottom-nav i { font-size: 22px; cursor: pointer; color: #fff; }

        /* Reels Snap Container */
        #reelsView { scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        #reelsView::-webkit-scrollbar { display: none; }
        .reel-video-container { scroll-snap-align: start; height: 100vh; width: 100%; background: #000; position: relative; }

        /* --- PROFILE STYLES --- */
        .profile-stats-container { display: flex; justify-content: space-around; padding: 20px 10px; border-bottom: 1px solid #333; text-align: center; }
        .stat-item b { display: block; font-size: 18px; color: #fff; }
        .stat-item span { font-size: 13px; color: #999; }
        .profile-actions { display: flex; gap: 10px; padding: 10px; }
        .edit-btn, .follow-btn { flex: 1; background: #333; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .follow-btn { background: #0095f6; }
        #userPostGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 10px; }
        #userPostGrid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .modal-overlay {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;}
        
        /* Upload Modal Styles */
        #uploadModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1001; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<header id="mainHeader">Rollera</header>

<div id="auth">
    <h1 style="text-align: center; font-family: 'Brush Script MT', cursive; font-size: 45px; margin-bottom: 30px;">Rollera</h1>
    <input id="login-email" placeholder="Email">
    <input id="login-password" type="password" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <div style="margin-top: 20px; text-align: center; color: #8e8e8e; font-size: 14px;">
        Don't have an account? <span onclick="openSignup()" style="color: #0095f6; font-weight: bold; cursor: pointer;">Sign up</span>
    </div>
</div>

<div id="app" style="display:none;">
    <div id="homeView">
        <div class="story-container">
            <div class="story-wrapper">
                <div class="story-ring"><img src="https://i.pravatar.cc/150?u=me"></div>
                <span>Your story</span>
            </div>
        </div>
        <div id="reelsContainer"></div>
    </div>

    <div id="searchView" style="display:none; padding: 10px 0;">
        <div style="padding: 10px;">
            <div style="background: #262626; border-radius: 10px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-magnifying-glass" style="color: #8e8e8e; font-size: 14px;"></i>
                <input type="text" id="search-input" placeholder="Search" oninput="handleSearch()" style="background: transparent; border: none; margin: 0; padding: 0; width: 100%; outline: none; font-size: 16px; color: white;">
            </div>
        </div>
        <div id="searchResults" style="margin-top: 10px;"></div>
        <div id="exploreGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 5px;"></div>
    </div>

    <div id="reelsView" style="display:none; height: 100vh; background: #000; overflow-y: scroll; scrollbar-width: none; position: fixed; top: 0; left: 0; width: 100%; z-index: 999;"></div>

    <div id="profileView" style="display:none; padding-top: 10px;">
        <div style="padding: 10px 20px; display: flex; align-items: center; gap: 20px;">
            <img src="https://i.pravatar.cc/150?u=me" style="width: 77px; height: 77px; border-radius: 50%; border: 1px solid #262626;">
            <div>
                <h2 id="profile-username" style="margin: 0; font-size: 20px;">user_name</h2>
                <button onclick="handleLogout()" style="background: #363636; color: white; padding: 5px 10px; margin-top: 8px; border-radius: 4px; font-size: 12px; width: auto;">Log Out</button>
            </div>
        </div>

        <div class="profile-stats-container">
            <div class="stat-item"><b id="post-count">0</b><span>Posts</span></div>
            <div class="stat-item"><b>250</b><span>Followers</span></div>
            <div class="stat-item"><b>180</b><span>Following</span></div>
        </div>

        <div class="profile-actions">
            <button class="follow-btn">Follow</button>
            <button class="edit-btn">Message</button>
        </div>

        <div id="userPostGrid"></div>
    </div>

    <div class="bottom-nav">
        <i class="fa-solid fa-house" onclick="showHome()"></i>
        <i class="fa-solid fa-magnifying-glass" onclick="showSearch()"></i>
        <i class="fa-regular fa-square-plus" onclick="openUpload()"></i>
        <i class="fa-solid fa-clapperboard" onclick="showReels()"></i>
        <i class="fa-regular fa-circle-user" onclick="showProfile()"></i>
    </div>
</div>

<div id="uploadModal">
    <div style="background:#262626; padding:20px; border-radius:12px; width:90%; max-width:400px; color:white; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <h3 style="margin-top:0; text-align:center;">Create New Post</h3>
        <hr style="border: 0.5px solid #444; margin-bottom: 15px;">
        <label style="font-size: 14px; color: #bbb;">Select Photo/Video:</label>
        <input type="file" id="fileInput" accept="image/*,video/*" style="margin:10px 0; background:transparent; border:none; padding:0;">
        <textarea id="uploadCaption" placeholder="Write a caption..." style="width:100%; background:#333; color:white; border:none; padding:10px; border-radius:5px; height: 80px; resize: none; margin-top:10px;"></textarea>
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <button onclick="closeUpload()" style="background:#444; color:white; border:none; padding:10px 15px; border-radius:5px; width:45%; margin:0;">Cancel</button>
            <button onclick="startUpload()" style="background:#0095f6; color:white; border:none; padding:10px 15px; border-radius:5px; width:45%; margin:0;">Share</button>
        </div>
    </div>
</div>

<div id="signupModal" class="modal-overlay"> 
    <div style="background: #000; width: 90%; max-width: 400px; padding: 25px; border-radius: 12px; border: 1px solid #262626; position: relative; max-height: 90vh; overflow-y: auto;">
        <i class="fa-solid fa-xmark" onclick="closeSignup()" style="position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer;"></i>
        <h1 style="text-align: center; font-family: 'Brush Script MT', cursive; font-size: 40px; margin-bottom: 10px;">Rollera</h1>
        <p style="text-align: center; color: #8e8e8e; font-weight: bold; margin-bottom: 20px;">Sign up to see photos and videos.</p>
        <input id="signup-email" placeholder="Email">
        <input id="signup-fullname" placeholder="Full Name">
        <input id="signup-username" placeholder="Username">
        <input id="signup-password" type="password" placeholder="Password">
        <div style="margin-top: 20px;">
            <label style="font-size: 12px; color: #8e8e8e; display: block; margin-bottom: 5px;">Birthday</label>
            <div style="display: flex; gap: 10px;">
                <select id="dob-month" style="flex: 1; padding: 8px; background: #121212; color: #fff; border: 0.5px solid #363636; border-radius: 4px;"></select>
                <select id="dob-day" style="flex: 1; padding: 8px; background: #121212; color: #fff; border: 0.5px solid #363636; border-radius: 4px;"></select>
                <select id="dob-year" style="flex: 1; padding: 8px; background: #121212; color: #fff; border: 0.5px solid #363636; border-radius: 4px;"></select>
            </div>
        </div>
        <button onclick="handleSignup()" style="margin-top: 20px;">Sign up</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
